name: Container

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and push container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # Cross-compile static musl binaries for each target platform.
      # This avoids QEMU emulation entirely — the final image stages only
      # COPY the pre-built binaries; no instructions execute under emulation.
      - name: Build binaries
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl
          cp zig-out/bin/stardust stardust-amd64

          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl
          cp zig-out/bin/stardust stardust-arm64

          zig build -Doptimize=ReleaseSafe -Dtarget=riscv64-linux-musl
          cp zig-out/bin/stardust stardust-riscv64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/riscv64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
