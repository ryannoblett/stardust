name: Container

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and push container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # Install Nix to build deterministic musl-linked libssh bundles for each
      # target architecture.  Binary caches at cache.nixos.org supply pre-built
      # derivations so no source compilation is needed in most cases.
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Build static libssh bundles for all three target architectures.
      # --print-out-paths prints the Nix store path; we capture it for later steps.
      - name: Build libssh static bundles
        run: |
          echo "LIBSSH_X86=$(nix build .#libssh-x86_64-musl  --no-link --print-out-paths)" >> "$GITHUB_ENV"
          echo "LIBSSH_ARM=$(nix build .#libssh-aarch64-musl --no-link --print-out-paths)" >> "$GITHUB_ENV"
          echo "LIBSSH_RISCV=$(nix build .#libssh-riscv64-musl --no-link --print-out-paths)" >> "$GITHUB_ENV"

      # Cross-compile static musl binaries for each target platform.
      # -Dlibssh_dir points to the Nix bundle with lib/ and include/ subdirs.
      - name: Build x86_64 binary
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl \
            -Dlibssh_dir="${{ env.LIBSSH_X86 }}"
          cp zig-out/bin/stardust stardust-amd64

      - name: Build arm64 binary
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl \
            -Dlibssh_dir="${{ env.LIBSSH_ARM }}"
          cp zig-out/bin/stardust stardust-arm64

      - name: Build riscv64 binary
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=riscv64-linux-musl \
            -Dlibssh_dir="${{ env.LIBSSH_RISCV }}"
          cp zig-out/bin/stardust stardust-riscv64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/riscv64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
