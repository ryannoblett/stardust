name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Format check
        run: zig fmt --check .
