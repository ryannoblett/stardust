# DHCP Server Configuration
listen_address: "0.0.0.0"

# Network configuration
subnet: "192.168.1.0"
router: "192.168.1.1"
subnet_mask: 255.255.255.0

# DHCP settings
lease_time: 3600

# DNS settings
dns_servers:
  - "8.8.8.8"
  - "8.8.4.4"

domain_name: "stardust.lan"

# Domain search list (option 119, RFC 3397) — sent to clients so short
# hostnames are resolved against these domains in order.
# domain_search:
#   - "stardust.lan"
#   - "local"

# Time configuration
# time_offset: 3600     # seconds east of UTC (option 2); e.g. -18000 = UTC-5, 3600 = UTC+1
# time_servers:         # RFC 868 time servers (option 4); legacy protocol
#   - "192.168.1.1"
# ntp_servers:          # NTP servers (option 42); preferred over time_servers for modern clients
#   - "192.168.1.1"
# log_servers:          # Log servers / syslog (option 7)
#   - "192.168.1.1"

# PXE / TFTP network boot (options 66 and 67)
# tftp_server_name: "192.168.1.1"   # TFTP server hostname or IP
# boot_filename: "pxelinux.0"       # boot file; use "ipxe.efi" for UEFI PXE

# State storage
state_dir: "/var/lib/stardust"

# DNS updates configuration
dns_update:
  enable: false
  server: "127.0.0.1"
  zone: "stardust.lan"
  key_name: "dhcp-update"
  key_file: "dhcp-update.key"

# Static reservations — pin a MAC (or client_id) to a specific IP
# reservations:
#   - mac: "aa:bb:cc:dd:ee:ff"
#     ip: "192.168.1.50"
#     hostname: "printer"           # optional; sent to client via option 12
#     client_id: "01aabbccddeeff"  # optional; hex string matching option 61

# Additional DHCP options (use numeric option codes as keys)
# dhcp_options:
#   "42": "192.168.1.1"  # NTP server
dhcp_options: {}
